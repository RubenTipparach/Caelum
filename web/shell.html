<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hex Planets</title>
<style>
* { margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a14; }
canvas {
    width: 100%;
    height: 100%;
    display: block;
    cursor: crosshair;
}
#loading {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #aaa;
    font-family: monospace;
    font-size: 16px;
}
</style>
</head>
<body>
<div id="loading">Loading Hex Planets...</div>
<canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
<script>
    // Prevent space/arrows/tab from scrolling the page (itch.io iframe)
    window.addEventListener('keydown', function(e) {
        if ([32, 37, 38, 39, 40, 9].indexOf(e.keyCode) !== -1) {
            e.preventDefault();
        }
    }, { passive: false });

    var Module = {
        canvas: (function() {
            var canvas = document.getElementById('canvas');
            canvas.setAttribute('tabindex', '0');
            canvas.addEventListener('webglcontextlost', function(e) {
                alert('WebGL context lost — please reload.');
                e.preventDefault();
            }, false);
            // Auto-focus canvas on any interaction
            canvas.addEventListener('mousedown', function() { canvas.focus(); });
            canvas.addEventListener('touchstart', function() { canvas.focus(); });
            return canvas;
        })(),
        onRuntimeInitialized: function() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('canvas').focus();
        }
    };
</script>
{{{ SCRIPT }}}
</body>
</html>
